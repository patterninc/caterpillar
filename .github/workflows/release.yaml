name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
      - 'ecr_docker_dep'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.7'
        
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_FORKLIFTPROD_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_FORKLIFTPROD_SECRET_KEY }}
        aws-region: us-west-2
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and push
      uses: docker/build-push-action@v5.1.0
      with:
        push: true
        context: build/Dockerfile
        tags: ${{ steps.login-ecr.outputs.registry }}/caterpillar:manual-latest
