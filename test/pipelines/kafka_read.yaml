tasks:
  - name: kafka_read
    type: kafka
    bootstrap_server: '{{ secret "/kafka/server" }}:9094'
    topic: test-caterpillar-topic
    user_auth_type: scram
    username: test-caterpillar
    password: {{ secret "/kafka/test-caterpillar/secret" }}
    server_auth_type: tls
    timeout: 2s
    end_after: 30s             # stop reading after 30s of wall-clock time, regardless of traffic
    auto_offset_reset: latest  # in group mode, skip historical data if stored offset is missing or out of range
    cert: |
      {{ indent 6 (secret "/kafka/ca-cert") }}

  - name: echo_results
    type: echo
    only_data: true
