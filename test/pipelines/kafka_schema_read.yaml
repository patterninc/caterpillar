# NOTE: Schema Registry credentials must be set in SSM before running this pipeline.
tasks:
  - name: kafka_schema_read
    type: kafka
    bootstrap_server: '{{ secret "/kafka/server" }}:9094'
    topic: test-caterpillar-topic
    server_auth_type: tls
    cert: |
      {{ indent 6 (secret "/kafka/ca-cert") }}
    user_auth_type: scram
    username: test-caterpillar
    password: {{ secret "/kafka/test-caterpillar/secret" }}
    schema_registry_url: '{{ secret "/kafka/schema-registry/url" }}'
    schema_registry_username: '{{ secret "/kafka/schema-registry/username" }}'
    schema_registry_password: '{{ secret "/kafka/schema-registry/password" }}'
    timeout: 10s
    retry_limit: 3

  - name: echo_results
    type: echo
    only_data: true
